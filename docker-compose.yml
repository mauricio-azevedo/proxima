# Local development services. Postgres runs in a throwaway container so the
# database is reproducible and never touches the host's system Postgres.
#   Start:  docker compose up -d
#   Stop:   docker compose down
#   Reset:  docker compose down -v   (deletes the volume / all data)
services:
  db:
    image: postgres:18-alpine
    container_name: proxima-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: proxima
      POSTGRES_PASSWORD: proxima
      POSTGRES_DB: proxima
    ports:
      # host:container — 5434 on the host to avoid clashing with the system
      # Postgres (5432) and other projects' containers (5433).
      - "5434:5432"
    volumes:
      # Postgres 18+ expects the mount at /var/lib/postgresql (it stores data in
      # a versioned subdirectory beneath it), not /var/lib/postgresql/data.
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxima -d proxima"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
