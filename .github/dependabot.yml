version: 2
updates:
  # App dependencies (pnpm uses the npm ecosystem). Grouped to keep PR noise low.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    # Conventional Commits so commitlint / the commit-msg hook accept the PR.
    commit-message:
      prefix: chore
      include: scope

  # Keep the GitHub Actions versions fresh (automates the manual bump we did).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
