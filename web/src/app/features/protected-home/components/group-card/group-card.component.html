<article class="group-card">
  <div class="group-card-main">
    <span class="role-pill">{{ roleLabel }}</span>
    <h3>{{ group.name }}</h3>
    <p>
      {{ group._count.members }} membro{{ group._count.members === 1 ? '' : 's' }} ·
      {{ group._count.peladas }} pelada{{ group._count.peladas === 1 ? '' : 's' }}
    </p>
  </div>

  <button class="card-action" type="button" disabled title="Detalhe do grupo vem na próxima etapa">
    Abrir em breve
  </button>
</article>
