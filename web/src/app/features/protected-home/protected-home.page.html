<app-shell
  eyebrow="Peladas"
  title="Suas peladas"
  subtitle="Acompanhe as peladas recorrentes, entre na lista do próximo dia e veja quando a fila começar."
  actionLabel="Nova pelada"
  (primaryActionRequested)="openCreateDialog()"
  (logoutRequested)="logout()"
>
  <app-pickup-games-list
    [pickupGames]="pickupGames()"
    [isLoading]="isLoading()"
    [errorMessage]="loadErrorMessage()"
    (reloadRequested)="loadPickupGames()"
    (createPickupGameRequested)="openCreateDialog()"
  />

  @if (isCreateDialogOpen()) {
    <app-create-pickup-game-dialog
      [isCreating]="isCreating()"
      [errorMessage]="createErrorMessage()"
      (closed)="closeCreateDialog()"
      (submitted)="createPickupGame($event)"
    />
  }
</app-shell>
