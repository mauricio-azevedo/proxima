<main class="groups-page">
  <app-groups-app-header
    [nickname]="user()?.nickname"
    (logoutRequested)="logout()"
  />

  <app-groups-hero
    [hasGroups]="hasGroups()"
    (createGroupRequested)="openCreateDialog()"
  />

  <app-groups-list
    [groups]="groups()"
    [isLoading]="isLoading()"
    [errorMessage]="loadErrorMessage()"
    (reloadRequested)="loadGroups()"
    (createGroupRequested)="openCreateDialog()"
  />

  @if (isCreateDialogOpen()) {
    <app-create-group-dialog
      [isCreating]="isCreating()"
      [errorMessage]="createErrorMessage()"
      (closed)="closeCreateDialog()"
      (submitted)="createGroup($event)"
    />
  }
</main>
