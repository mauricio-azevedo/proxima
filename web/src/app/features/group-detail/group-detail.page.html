<app-shell
  eyebrow="Grupo"
  [title]="pageTitle()"
  [subtitle]="pageSubtitle()"
  [showBackLink]="true"
  [actionLabel]="canManageMembers() ? 'Adicionar membro' : ''"
  (primaryActionRequested)="openAddMemberDialog()"
  (logoutRequested)="logout()"
>
  @if (isLoading()) {
    <section class="state-card loading-state" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      <p>Carregando grupo...</p>
    </section>
  } @else if (loadErrorMessage()) {
    <section class="state-card error-state" role="alert">
      <strong>Algo deu errado</strong>
      <p>{{ loadErrorMessage() }}</p>
      <button type="button" class="secondary-button" (click)="loadPage()">Tentar novamente</button>
    </section>
  } @else {
    <section class="quick-actions" aria-label="Ações rápidas">
      <article>
        <span>Status</span>
        <strong>{{ group()?._count?.peladas ? 'Com histórico' : 'Novo grupo' }}</strong>
      </article>
      <article>
        <span>Seu papel</span>
        <strong>{{ canManageMembers() ? 'Admin' : 'Membro' }}</strong>
      </article>
    </section>

    <app-group-members-list
      [members]="members()"
      [canManageMembers]="canManageMembers()"
      (addMemberRequested)="openAddMemberDialog()"
    />
  }

  @if (isAddMemberDialogOpen()) {
    <app-add-group-member-dialog
      [isSubmitting]="isAddingMember()"
      [errorMessage]="addMemberErrorMessage()"
      (closed)="closeAddMemberDialog()"
      (submitted)="addMember($event)"
    />
  }
</app-shell>
